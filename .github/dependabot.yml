version: 2
updates:
  - package-ecosystem: nuget
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      microsoft:
        patterns:
          - "Microsoft.*"
          - "System.*"
      community-toolkit:
        patterns:
          - "CommunityToolkit.*"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
