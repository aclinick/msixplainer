name: Bug Report
description: Report a bug in MSIXplainer
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for reporting a bug! Please fill in the details below.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Run `msixplainer path/to/file.msix`
        2. ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behaviour
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behaviour
      description: What actually happened? Include error messages or screenshots if applicable.
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - CLI
        - WinUI App
        - Core Library
        - Rules Engine
        - Other
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS Version
      placeholder: "e.g., Windows 11 24H2"

  - type: input
    id: dotnet
    attributes:
      label: .NET Version
      placeholder: "e.g., .NET 10.0.100"
